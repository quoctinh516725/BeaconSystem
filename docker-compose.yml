services:
  # Module Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beacons_frontend
    volumes:
      - /var/www/Beacons:/app/dist

  # Module Backend (Node.js)
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: beacons_backend
    ports:
      - "3001:3001"
    environment:
      # Override các URL nội bộ trong docker network
      - REDIS_URL=redis://redis:6379
      - AI_URL=http://ai:8000
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ./Backend/.env
    depends_on:
      - redis
      - ai
    networks:
      - beacons_net

  # Module AI (FastAPI / PyTorch)
  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile
    container_name: beacons_ai
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./AI/.env
    networks:
      - beacons_net

  # Redis Database (Dành cho BullMQ)
  redis:
    image: redis:7-alpine
    container_name: beacons_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - beacons_net

  # Node Exporter - Giám sát tài nguyên VPS Host
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: beacons_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    ports:
      - "9100:9100"
    networks:
      - beacons_net
    restart: unless-stopped

  # Prometheus - Thu thập time-series metrics
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: beacons_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - beacons_net
    restart: unless-stopped

  # Alertmanager - Quản lý và gửi cảnh báo
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: beacons_alertmanager
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - beacons_net
    restart: unless-stopped

  # k6 - Dịch vụ mô phỏng tải / load testing
  k6:
    image: grafana/k6:1.0.0
    container_name: beacons_k6
    volumes:
      - ./k6:/app
    environment:
      - TARGET_HOST=http://backend:3001
    entrypoint: ["k6", "run", "/app/load-test.js"]
    networks:
      - beacons_net
    profiles:
      - tools

  # Promtail - Thu thập và đẩy log lên Grafana Cloud Loki
  promtail:
    image: grafana/promtail:3.0.0
    container_name: beacons_promtail
    user: "0:0"
    volumes:
      - ./prometheus/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - beacons_net
    restart: unless-stopped

networks:
  beacons_net:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
