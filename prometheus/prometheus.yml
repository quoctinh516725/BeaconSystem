global:
  scrape_interval: 2s
  evaluation_interval: 2s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'


scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3001']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

