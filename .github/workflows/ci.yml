name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Cập nhật lên Node 22 nếu dự án hỗ trợ để tránh cảnh báo deprecation
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Cập nhật lên Node 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beacons_test
        run: npx prisma generate

      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beacons_test
        run: npm test

  ai:
    name: AI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: AI/requirements.txt

      # BỔ SUNG: Cài đặt dependencies để tạo dữ liệu cache cho pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test
        run: python -m unittest discover -s tests

  deploys:
    needs: [frontend, backend, ai]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3 # Cập nhật version cụ thể thay vì dùng master để đảm bảo ổn định định với môi trường Node mới
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /root/BeaconSystem
            git fetch origin main
            git reset --hard origin/main
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose build
            docker compose up -d
            systemctl restart nginx
